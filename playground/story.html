<!DOCTYPE html>
<html lang="en" data-mode="vivid">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felipe Caracas · How I Think</title>
  <link rel="stylesheet" href="../src/styles/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }

    body {
      overflow-x: hidden;
      background: var(--s-bg);
      color: var(--s-fg);
      transition: background .45s ease, color .45s ease;
      cursor: none;
    }

    /* ── COLOR MODES ────────────────────────────────────── */

    [data-mode="vivid"] {
      --s-bg:          #06070f;
      --s-fg:          #f0f2ff;
      --s-fg2:         #9098d0;
      --s-fg3:         #3a4060;
      --s-accent:      #4f8fff;
      --s-accent2:     #a855f7;
      --s-accent3:     #39ff8f;
      --s-glow:        rgba(79,143,255,0.36);
      --s-glow2:       rgba(168,85,247,0.28);
      --s-glow3:       rgba(57,255,143,0.22);
      --s-card:        rgba(255,255,255,0.045);
      --s-card-border: rgba(255,255,255,0.09);
      --s-chip:        rgba(255,255,255,0.06);
    }

    [data-mode="dark"] {
      --s-bg:          #070910;
      --s-fg:          #dde2ff;
      --s-fg2:         #5a6898;
      --s-fg3:         #2e3450;
      --s-accent:      #3b82f6;
      --s-accent2:     #7c3aed;
      --s-accent3:     #22c55e;
      --s-glow:        rgba(59,130,246,0.24);
      --s-glow2:       rgba(124,58,237,0.20);
      --s-glow3:       rgba(34,197,94,0.16);
      --s-card:        rgba(255,255,255,0.03);
      --s-card-border: rgba(255,255,255,0.06);
      --s-chip:        rgba(255,255,255,0.04);
    }

    [data-mode="light"] {
      --s-bg:          #f3f5ff;
      --s-fg:          #0a0e30;
      --s-fg2:         #4a5280;
      --s-fg3:         #9aa0c0;
      --s-accent:      #0057ff;
      --s-accent2:     #7c3aed;
      --s-accent3:     #059669;
      --s-glow:        rgba(0,87,255,0.12);
      --s-glow2:       rgba(124,58,237,0.10);
      --s-glow3:       rgba(5,150,105,0.10);
      --s-card:        rgba(255,255,255,0.82);
      --s-card-border: rgba(0,0,0,0.08);
      --s-chip:        rgba(0,0,0,0.05);
    }

    /* ── FIXED LAYERS ───────────────────────────────────── */

    #sandCanvas {
      position: fixed; inset: 0;
      z-index: 1; pointer-events: none;
    }

    #bgTint {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
      border-radius: 0;
    }

    /* ── CURSOR ─────────────────────────────────────────── */

    .cur-dot, .cur-ring {
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 10000;
      border-radius: 50%; transform: translate(-50%,-50%);
    }
    .cur-dot  { width: 5px; height: 5px; background: var(--s-accent); transition: background .4s; }
    .cur-ring {
      width: 30px; height: 30px;
      border: 1.5px solid var(--s-accent); opacity: .4;
      transition: width .22s, height .22s, opacity .22s, border-color .4s;
    }
    body:has(a:hover) .cur-ring,
    body:has(button:hover) .cur-ring { width: 46px; height: 46px; opacity: .85; }

    /* ── PROGRESS ───────────────────────────────────────── */

    .pbar {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--s-accent), var(--s-accent2), var(--s-accent3));
      z-index: 9999; transition: background .45s;
    }

    /* ── MODE SWITCHER ──────────────────────────────────── */

    .modes {
      position: fixed; top: 24px; right: 24px; z-index: 9000;
      display: flex; gap: 8px; align-items: center;
      padding: 7px 10px; border-radius: 999px;
      background: var(--s-card); border: 1px solid var(--s-card-border);
      backdrop-filter: blur(16px);
      transition: background .4s, border-color .4s;
    }
    .mdot {
      width: 14px; height: 14px; border-radius: 50%;
      cursor: none; border: 2px solid transparent;
      transition: transform .2s, border-color .2s;
    }
    .mdot:hover { transform: scale(1.25); }
    .mdot.on { border-color: rgba(255,255,255,.75); }
    [data-mode="light"] .mdot.on { border-color: rgba(0,0,0,.45); }
    /* vivid dot now shows all 3 accent colors */
    .mdot[data-m="vivid"] { background: linear-gradient(135deg, #4f8fff 0%, #a855f7 50%, #39ff8f 100%); }
    .mdot[data-m="dark"]  { background: #1c2040; }
    .mdot[data-m="light"] { background: #dde2ff; border-color: rgba(0,0,0,.12); }

    /* ── SHARED ─────────────────────────────────────────── */

    .fold { position: relative; z-index: 2; }

    /* ── HERO ───────────────────────────────────────────── */

    #hero { height: 200vh; }

    .hero-sticky {
      position: sticky; top: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .h-blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px); pointer-events: none; transition: background .45s;
    }
    .h-blob-a { width: 600px; height: 600px; top: -140px; left: -140px; background: var(--s-glow); opacity: .5; }
    .h-blob-b { width: 460px; height: 460px; bottom: -90px; right: -90px; background: var(--s-glow2); opacity: .4; }
    .h-blob-c { width: 360px; height: 360px; bottom: 20%; left: 30%; background: var(--s-glow3); opacity: .25; }

    /* vignette so text always readable over sand */
    .hero-sticky::after {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse 55% 55% at 50% 50%, transparent 25%, var(--s-bg) 100%);
      opacity: .65; transition: background .45s;
    }

    .hero-copy {
      position: relative; z-index: 2;
      text-align: center; padding: 0 32px;
      max-width: 860px; width: 100%;
      will-change: transform, opacity;
    }

    .hero-eyebrow {
      display: block; margin-bottom: 20px;
      font-size: clamp(10px, 1.1vw, 13px); font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--s-fg3); transition: color .45s;
    }
    .hero-eyebrow .ch {
      display: inline-block;
      opacity: 0; transform: translateY(-18px);
      animation: charDrop .42s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes charDrop { to { opacity: 1; transform: none; } }

    .hero-h1 {
      font-size: clamp(32px, 6vw, 78px);
      font-weight: 800; letter-spacing: -.035em;
      line-height: 1.07; color: var(--s-fg); transition: color .45s;
    }
    .hero-sub {
      margin-top: 16px;
      font-size: clamp(14px, 1.9vw, 22px);
      font-weight: 400; color: var(--s-fg2); transition: color .45s;
    }

    .w {
      display: inline-block; margin-right: .25em;
      opacity: 0; transform: translateY(18px);
      transition: opacity .5s, transform .5s;
      will-change: opacity, transform;
    }
    .w.vis  { opacity: 1; transform: none; }
    .w.hi   { color: var(--s-accent);  transition: opacity .5s, transform .5s, color .45s; }
    .w.hi2  { color: var(--s-accent3); transition: opacity .5s, transform .5s, color .45s; }

    .hero-hint {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%); z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; animation: fadeUp .5s ease 1.8s forwards;
    }
    .hero-hint-line {
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--s-fg2));
      animation: lineGrow 1.9s ease 1.8s infinite;
    }
    @keyframes lineGrow {
      0%  { height: 0; opacity: 0; }
      45% { height: 36px; opacity: 1; }
      100%{ height: 36px; opacity: 0; }
    }
    .hero-hint-label {
      font-size: 9px; letter-spacing: .25em; text-transform: uppercase;
      color: var(--s-fg3); transition: color .45s;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateX(-50%); } }

    /* ── PRINCIPLES ─────────────────────────────────────── */

    .p-shelf {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      z-index: 800; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      pointer-events: none;
      opacity: 0; transition: opacity .3s;
    }
    .p-shelf.vis { opacity: 1; }

    .p-chip {
      padding: 4px 14px; border-radius: 999px;
      background: var(--s-chip); border: 1px solid var(--s-card-border);
      backdrop-filter: blur(16px);
      font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--s-fg3);
      transform: translateY(-12px) scale(.88); opacity: 0;
      transition: transform .4s cubic-bezier(.34,1.4,.64,1), opacity .3s, color .45s;
    }
    .p-chip.vis { transform: none; opacity: 1; }

    /* Each slot is 200vh — 100vh sticky + 100vh of scroll room for char reveal */
    .p-slot { height: 200vh; }

    .p-sticky {
      position: sticky; top: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .p-inner {
      text-align: center; max-width: 620px; padding: 0 32px;
      opacity: 0; transform: translateY(24px);
      transition: opacity .65s, transform .65s;
    }
    .p-inner.in   { opacity: 1; transform: none; }
    .p-inner.gone { opacity: 0; transform: translateY(-18px); }

    .p-num {
      font-size: 11px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--s-accent);
      margin-bottom: 18px; transition: color .45s;
    }

    .p-title {
      font-size: clamp(34px, 5.5vw, 68px);
      font-weight: 800; letter-spacing: -.035em;
      line-height: 1.05; color: var(--s-fg);
      margin-bottom: 28px; transition: color .45s;
    }

    .p-para {
      font-size: clamp(15px, 1.7vw, 19px);
      line-height: 1.75; color: var(--s-fg2);
      font-weight: 400; transition: color .45s;
    }

    /* individual char — revealed by JS without CSS transitions (perf) */
    .pc {
      display: inline;
      opacity: 0.05;
      filter: blur(2px);
    }
    .pc.r {
      opacity: 1;
      filter: none;
    }

    .p-counter {
      position: fixed; right: 28px; bottom: 40px;
      font-size: 11px; font-weight: 600; letter-spacing: .14em;
      color: var(--s-fg3); z-index: 700;
      opacity: 0; transition: opacity .3s, color .45s;
    }
    .p-counter.vis { opacity: 1; }

    /* ── WORK ───────────────────────────────────────────── */

    #f4 {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .f4-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--s-accent); margin-bottom: 52px;
      opacity: 0; transform: translateY(10px);
      transition: opacity .6s, transform .6s, color .45s;
    }
    #f4.in .f4-eyebrow { opacity: 1; transform: none; }

    .glass-stage {
      position: relative;
      width: min(820px, 100vw - 48px); height: 340px;
      transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.34,1.2,.64,1);
    }

    .proj-card {
      position: absolute;
      width: 248px; height: 306px; border-radius: 20px;
      background: var(--s-card); border: 1px solid var(--s-card-border);
      backdrop-filter: blur(24px); overflow: hidden; cursor: none;
      transition:
        transform .55s cubic-bezier(.34,1.2,.64,1),
        box-shadow .45s, background .45s, border-color .45s;
    }
    .proj-card:nth-child(1) {
      left: 0; top: 18px;
      transform: rotateX(-4deg) rotateY(10deg) rotateZ(-1.5deg);
      box-shadow: 18px 26px 52px rgba(0,0,0,.50);
    }
    .proj-card:nth-child(2) {
      left: 50%; top: 0;
      transform: translateX(-50%) rotateX(2deg) rotateY(-1deg);
      box-shadow: 0 32px 68px rgba(0,0,0,.56); z-index: 2;
    }
    .proj-card:nth-child(3) {
      right: 0; top: 26px;
      transform: rotateX(-3deg) rotateY(-10deg) rotateZ(1.5deg);
      box-shadow: -18px 26px 52px rgba(0,0,0,.50);
    }
    .proj-card:nth-child(1):hover {
      transform: rotateX(0) rotateY(0) rotateZ(0) translateY(-10px) scale(1.04);
      box-shadow: 0 44px 80px rgba(0,0,0,.60); z-index: 10;
    }
    .proj-card:nth-child(2):hover {
      transform: translateX(-50%) rotateX(0) rotateY(0) translateY(-10px) scale(1.04);
      box-shadow: 0 44px 80px rgba(0,0,0,.60); z-index: 10;
    }
    .proj-card:nth-child(3):hover {
      transform: rotateX(0) rotateY(0) rotateZ(0) translateY(-10px) scale(1.04);
      box-shadow: 0 44px 80px rgba(0,0,0,.60); z-index: 10;
    }

    .proj-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .proj-ph-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--s-card-border); }
    .proj-ph-bar { height: 7px; border-radius: 4px; background: var(--s-card-border); }
    .proj-ph-bar.lg { width: 110px; }
    .proj-ph-bar.sm { width: 72px; opacity: .55; }
    .proj-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 22px 22px;
      background: linear-gradient(0deg, rgba(0,0,0,.72), transparent);
    }
    .proj-label-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.92); }
    .proj-label-cat  { font-size: 11px; color: rgba(255,255,255,.44); margin-top: 3px; }

    .f4-cta {
      margin-top: 52px; font-size: 15px; font-weight: 600;
      color: var(--s-fg2); text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      position: relative; cursor: none;
      opacity: 0; transform: translateY(10px);
      transition: opacity .6s .2s, transform .6s .2s, color .2s;
    }
    #f4.in .f4-cta { opacity: 1; transform: none; }
    .f4-cta::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1.5px; background: var(--s-accent);
      transition: width .35s;
    }
    .f4-cta:hover { color: var(--s-fg); }
    .f4-cta:hover::after { width: 100%; }

    /* ── EXIT ───────────────────────────────────────────── */

    #f5 {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; position: relative; overflow: hidden;
    }
    .f5-glow {
      position: absolute; width: 700px; height: 700px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, var(--s-glow) 0%, transparent 65%);
      pointer-events: none;
      opacity: 0; transition: opacity .9s .3s, background .45s;
    }
    #f5.in .f5-glow { opacity: 1; }
    .f5-body { position: relative; z-index: 1; }
    .f5-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .22em;
      text-transform: uppercase; color: var(--s-fg3); margin-bottom: 22px;
      opacity: 0; transition: opacity .6s, color .45s;
    }
    #f5.in .f5-eyebrow { opacity: 1; }
    .f5-name {
      font-size: clamp(42px, 7.5vw, 92px); font-weight: 800;
      letter-spacing: -.04em; line-height: 1; color: var(--s-fg);
      margin-bottom: 16px;
      opacity: 0; transform: translateY(22px);
      transition: opacity .65s .1s, transform .65s .1s, color .45s;
    }
    #f5.in .f5-name { opacity: 1; transform: none; }
    .f5-sub {
      font-size: clamp(14px, 1.8vw, 20px); color: var(--s-fg2); margin-bottom: 44px;
      opacity: 0; transform: translateY(14px);
      transition: opacity .65s .2s, transform .65s .2s, color .45s;
    }
    #f5.in .f5-sub { opacity: 1; transform: none; }
    .f5-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 34px; border-radius: 999px;
      background: var(--s-accent); color: #fff;
      font-size: 15px; font-weight: 600; text-decoration: none; cursor: none;
      box-shadow: 0 8px 36px var(--s-glow);
      opacity: 0; transform: translateY(14px);
      transition: opacity .65s .3s, transform .65s .3s, background .25s, box-shadow .25s;
    }
    #f5.in .f5-btn { opacity: 1; transform: none; }
    .f5-btn:hover { background: var(--s-accent2); box-shadow: 0 12px 44px var(--s-glow2); }

    /* ── GRAIN ──────────────────────────────────────────── */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9997; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.027;
    }

    @media (max-width: 600px) {
      body { cursor: auto; }
      .cur-dot, .cur-ring { display: none; }
      .proj-card:nth-child(1), .proj-card:nth-child(3) { display: none; }
      .proj-card:nth-child(2) { left: 50%; }
      .glass-stage { height: 320px; }
    }
  </style>
</head>
<body>

<canvas id="sandCanvas"></canvas>
<div id="bgTint"></div>

<div class="cur-dot"  id="cDot"></div>
<div class="cur-ring" id="cRing"></div>
<div class="pbar"     id="pbar"></div>

<div class="modes">
  <div class="mdot on" data-m="vivid"></div>
  <div class="mdot"    data-m="dark"></div>
  <div class="mdot"    data-m="light"></div>
</div>

<div class="p-shelf"   id="shelf"></div>
<div class="p-counter" id="pcounter"></div>

<!-- HERO -->
<section id="hero" class="fold">
  <div class="hero-sticky">
    <div class="h-blob h-blob-a"></div>
    <div class="h-blob h-blob-b"></div>
    <div class="h-blob h-blob-c"></div>
    <div class="hero-copy" id="heroCopy">
      <span class="hero-eyebrow" id="eyebrow"></span>
      <div class="hero-h1"  id="herol1"></div>
      <div class="hero-sub" id="herol2"></div>
    </div>
    <div class="hero-hint">
      <div class="hero-hint-line"></div>
      <span class="hero-hint-label">Scroll</span>
    </div>
  </div>
</section>

<!-- PRINCIPLES -->
<section id="f3" class="fold">
  <div class="p-slot" data-idx="0">
    <div class="p-sticky">
      <div class="p-inner" id="pi0">
        <div class="p-num">01</div>
        <div class="p-title">Systems over screens</div>
        <div class="p-para" id="pp0"></div>
      </div>
    </div>
  </div>
  <div class="p-slot" data-idx="1">
    <div class="p-sticky">
      <div class="p-inner" id="pi1">
        <div class="p-num">02</div>
        <div class="p-title">Design that converts</div>
        <div class="p-para" id="pp1"></div>
      </div>
    </div>
  </div>
</section>

<!-- WORK -->
<section id="f4" class="fold">
  <div class="f4-eyebrow">Selected Work</div>
  <div class="glass-stage" id="stage">
    <div class="proj-card">
      <div class="proj-ph">
        <div class="proj-ph-ico"></div>
        <div class="proj-ph-bar lg"></div>
        <div class="proj-ph-bar sm"></div>
      </div>
      <div class="proj-label">
        <div class="proj-label-name">Project One</div>
        <div class="proj-label-cat">Fintech · UX Design</div>
      </div>
    </div>
    <div class="proj-card">
      <div class="proj-ph">
        <div class="proj-ph-ico"></div>
        <div class="proj-ph-bar lg"></div>
        <div class="proj-ph-bar sm"></div>
      </div>
      <div class="proj-label">
        <div class="proj-label-name">Project Two</div>
        <div class="proj-label-cat">Product · Systems</div>
      </div>
    </div>
    <div class="proj-card">
      <div class="proj-ph">
        <div class="proj-ph-ico"></div>
        <div class="proj-ph-bar lg"></div>
        <div class="proj-ph-bar sm"></div>
      </div>
      <div class="proj-label">
        <div class="proj-label-name">Project Three</div>
        <div class="proj-label-cat">AI · Experience</div>
      </div>
    </div>
  </div>
  <a class="f4-cta" href="https://felipecaracas.com" target="_blank">
    See all work
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </a>
</section>

<!-- EXIT -->
<section id="f5" class="fold">
  <div class="f5-glow"></div>
  <div class="f5-body">
    <div class="f5-eyebrow">Let's build something that matters</div>
    <div class="f5-name">Felipe Caracas</div>
    <div class="f5-sub">Senior Product Designer · Available for projects</div>
    <a class="f5-btn" href="https://felipecaracas.com" target="_blank">
      View full portfolio
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</section>

<script>
  /* ── CURSOR ─────────────────────────────────────────── */

  const cDot  = document.getElementById('cDot');
  const cRing = document.getElementById('cRing');
  let cx = -200, cy = -200, crx = -200, cry = -200;

  document.addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });

  (function cursorLoop() {
    crx += (cx - crx) * 0.13;
    cry += (cy - cry) * 0.13;
    cDot.style.transform  = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;
    cRing.style.transform = `translate(calc(${crx}px - 50%), calc(${cry}px - 50%))`;
    requestAnimationFrame(cursorLoop);
  })();

  /* ── MODE SWITCHER ──────────────────────────────────── */

  document.querySelectorAll('.mdot').forEach(d => {
    d.addEventListener('click', () => {
      document.querySelectorAll('.mdot').forEach(x => x.classList.remove('on'));
      d.classList.add('on');
      document.documentElement.setAttribute('data-mode', d.dataset.m);
    });
  });

  /* ── HERO: EYEBROW + WORDS ──────────────────────────── */

  const eyebrow = document.getElementById('eyebrow');
  'Felipe Caracas'.split('').forEach((ch, i) => {
    const s = document.createElement('span');
    s.className = 'ch';
    s.textContent = ch === ' ' ? ' ' : ch;
    s.style.animationDelay = `${i * 38}ms`;
    eyebrow.appendChild(s);
  });

  const herol1 = document.getElementById('herol1');
  const herol2 = document.getElementById('herol2');

  [
    { el: herol1, words: ['I','design','for','systems,','not','only','screens.'], hi: new Set(['systems,']) },
    { el: herol2, words: ['Thoughtful','experiences','that','convert','people.'], hi: new Set(['convert']), cls: 'hi2' },
  ].forEach(({ el, words, hi, cls }) => {
    words.forEach(w => {
      const s = document.createElement('span');
      s.className = 'w' + (hi.has(w) ? ' ' + (cls || 'hi') : '');
      s.textContent = w;
      el.appendChild(s);
    });
  });

  const allWords = [...document.querySelectorAll('.w')];

  /* ── PRINCIPLES: CHAR SPLIT ─────────────────────────── */

  const paraTexts = [
    'Every interface hides a system. I design the invisible architecture first — the flows, states, and decisions — before thinking about a single pixel.',
    'Beautiful doesn\'t convert on its own. I design for behavior: what people actually do, not what they say. Real outcomes, measured against real decisions.',
  ];

  const paraEls   = [document.getElementById('pp0'), document.getElementById('pp1')];
  const paraChars = [[], []];

  paraTexts.forEach((text, ti) => {
    text.split('').forEach(ch => {
      const s = document.createElement('span');
      s.className = 'pc';
      s.textContent = ch;
      paraEls[ti].appendChild(s);
      paraChars[ti].push(s);
    });
  });

  /* ── SHELF CHIPS ────────────────────────────────────── */

  const shelf    = document.getElementById('shelf');
  const pcounter = document.getElementById('pcounter');

  ['01  Systems over screens', '02  Design that converts'].forEach((label, i) => {
    const chip = document.createElement('div');
    chip.className = 'p-chip'; chip.id = `chip${i}`;
    chip.textContent = label;
    shelf.appendChild(chip);
  });

  /* ── SAND PARTICLES ─────────────────────────────────── */

  const sCanvas = document.getElementById('sandCanvas');
  const sCtx    = sCanvas.getContext('2d');
  const SAND_N       = 360;
  const REPEL_R      = 88;
  const REPEL_STR    = 0.20;
  const SPRING_K     = 0.0007;
  const DAMPING      = 0.965;

  let particles = [];
  let smx = -1000, smy = -1000; // mouse off-screen initially

  function resizeSand() {
    const oldW = sCanvas.width || window.innerWidth;
    const oldH = sCanvas.height || window.innerHeight;
    sCanvas.width  = window.innerWidth;
    sCanvas.height = window.innerHeight;
    const sx = sCanvas.width / oldW, sy = sCanvas.height / oldH;
    particles.forEach(p => {
      p.x  *= sx; p.y  *= sy;
      p.ox *= sx; p.oy *= sy;
    });
  }

  function makeSand() {
    particles = Array.from({ length: SAND_N }, () => {
      const x = Math.random() * sCanvas.width;
      const y = Math.random() * sCanvas.height;
      return {
        x, y, ox: x, oy: y,
        vx: 0, vy: 0,
        r:  Math.random() * 0.9 + 0.25,
        // color type: 0=warm gold, 1=cool violet, 2=white
        ct: Math.floor(Math.random() * 3),
        opacity: Math.random() * 0.35 + 0.15,
      };
    });
  }

  function sandColor(p) {
    const m = document.documentElement.getAttribute('data-mode') || 'vivid';
    if (m === 'light') return `rgba(80,110,200,${p.opacity * 0.55})`;
    if (m === 'dark')  return `rgba(140,155,200,${p.opacity * 0.7})`;
    // vivid: mix warm + cool + neon
    if (p.ct === 0) return `rgba(255,215,120,${p.opacity})`;       // warm gold
    if (p.ct === 1) return `rgba(175,155,255,${p.opacity})`;       // cool violet
    return             `rgba(220,230,255,${p.opacity * 0.85})`;    // white-blue
  }

  function drawSand() {
    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);

    particles.forEach(p => {
      // Cursor repulsion
      const dx = p.x - smx, dy = p.y - smy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < REPEL_R && dist > 0.01) {
        const force = (1 - dist / REPEL_R) * REPEL_STR;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }

      // Spring back to origin
      p.vx += (p.ox - p.x) * SPRING_K;
      p.vy += (p.oy - p.y) * SPRING_K;

      // Damping + tiny drift
      p.vx *= DAMPING;
      p.vy *= DAMPING;
      p.vx += (Math.random() - 0.5) * 0.012;
      p.vy += (Math.random() - 0.5) * 0.012;

      p.x += p.vx;
      p.y += p.vy;

      // Draw
      sCtx.beginPath();
      sCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      sCtx.fillStyle = sandColor(p);
      sCtx.fill();
    });

    requestAnimationFrame(drawSand);
  }

  document.addEventListener('mousemove', e => { smx = e.clientX; smy = e.clientY; });
  window.addEventListener('resize', resizeSand);
  resizeSand(); makeSand(); requestAnimationFrame(drawSand);

  /* ── SECTION COLOR TINT ─────────────────────────────── */

  const bgTint = document.getElementById('bgTint');

  // [r, g, b, alpha]
  const TINTS = {
    hero: [0,   60, 200, 0.055],
    f3:   [110, 20, 215, 0.065],
    f4:   [0,  160, 100, 0.045],
    f5:   [55,   0, 190, 0.060],
  };

  let tCurrent = { r: 0,  g: 60, b: 200, a: 0.055 };
  let tTarget  = { r: 0,  g: 60, b: 200, a: 0.055 };

  function lerp(a, b, t) { return a + (b - a) * t; }

  function animateTint() {
    tCurrent.r = lerp(tCurrent.r, tTarget.r, 0.025);
    tCurrent.g = lerp(tCurrent.g, tTarget.g, 0.025);
    tCurrent.b = lerp(tCurrent.b, tTarget.b, 0.025);

    const m = document.documentElement.getAttribute('data-mode') || 'vivid';
    const alpha = m === 'light' ? tTarget.a * 0.5 : tTarget.a;

    const rr = Math.round(tCurrent.r);
    const rg = Math.round(tCurrent.g);
    const rb = Math.round(tCurrent.b);

    bgTint.style.background =
      `radial-gradient(ellipse 75% 75% at 50% 50%, rgba(${rr},${rg},${rb},${alpha}) 0%, transparent 72%)`;

    requestAnimationFrame(animateTint);
  }
  requestAnimationFrame(animateTint);

  function setTint(id) {
    const t = TINTS[id];
    if (t) { tTarget.r = t[0]; tTarget.g = t[1]; tTarget.b = t[2]; tTarget.a = t[3]; }
  }

  /* ── STAGE TILT ─────────────────────────────────────── */

  const stage = document.getElementById('stage');

  stage.addEventListener('mousemove', e => {
    const r  = stage.getBoundingClientRect();
    const rx = ((e.clientY - r.top)  / r.height - .5) * -7;
    const ry = ((e.clientX - r.left) / r.width  - .5) *  9;
    stage.style.transform = `perspective(1400px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  });
  stage.addEventListener('mouseleave', () => {
    stage.style.transform = 'perspective(1400px) rotateX(0) rotateY(0)';
  });

  /* ── INTERSECTION OBSERVER ──────────────────────────── */

  new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.2 }).observe(document.getElementById('f4'));

  new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.2 }).observe(document.getElementById('f5'));

  /* ── SCROLL ─────────────────────────────────────────── */

  const hero      = document.getElementById('hero');
  const f3        = document.getElementById('f3');
  const f4        = document.getElementById('f4');
  const f5        = document.getElementById('f5');
  const heroCopy  = document.getElementById('heroCopy');
  const pbar      = document.getElementById('pbar');
  const pInners   = [document.getElementById('pi0'), document.getElementById('pi1')];
  const pSlots    = document.querySelectorAll('.p-slot');

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  window.addEventListener('scroll', () => {
    const scrollY   = window.scrollY;
    const maxScroll = document.body.scrollHeight - window.innerHeight;

    /* Progress bar */
    pbar.style.width = `${(scrollY / maxScroll) * 100}%`;

    /* Section tint */
    const f3top = f3.getBoundingClientRect().top;
    const f4top = f4.getBoundingClientRect().top;
    const f5top = f5.getBoundingClientRect().top;
    const vh    = window.innerHeight;

    if      (f5top < vh * 0.6) setTint('f5');
    else if (f4top < vh * 0.6) setTint('f4');
    else if (f3top < vh * 0.6) setTint('f3');
    else                        setTint('hero');

    /* Hero exit — scale up in last 30% of hero scroll */
    const heroSpan = hero.offsetHeight - vh;
    const heroP    = clamp(scrollY / heroSpan, 0, 1);
    const exitP    = clamp((heroP - 0.68) / 0.32, 0, 1);
    heroCopy.style.transform = `scale(${1 + exitP * 3.5})`;
    heroCopy.style.opacity   = String(clamp(1 - exitP * 2.8, 0, 1));

    /* Hero word reveal — first 72% of hero scroll */
    const revP = clamp(heroP / 0.72, 0, 1);
    allWords.forEach((w, i) => {
      w.classList.toggle('vis', revP >= (i / (allWords.length - 1)) * 0.88);
    });

    /* Principles */
    const f3rect  = f3.getBoundingClientRect();
    const inF3    = f3rect.top < vh && f3rect.bottom > 0;
    shelf.classList.toggle('vis', inF3 && f3rect.top < -10);

    let activeIdx = -1;

    pSlots.forEach((slot, i) => {
      const r       = slot.getBoundingClientRect();
      const entered = r.top < vh * 0.75;
      const leaving = r.bottom < vh * 0.25;
      const scrolledIn = Math.max(0, -r.top);
      const maxSc   = slot.offsetHeight - vh;
      const progress = maxSc > 0 ? clamp(scrolledIn / maxSc, 0, 1) : 0;

      /* Title show/hide */
      pInners[i].classList.toggle('in',   entered && !leaving);
      pInners[i].classList.toggle('gone', leaving);

      /* Shelf chip */
      document.getElementById(`chip${i}`)?.classList.toggle('vis', leaving);

      /* Char reveal — from progress 0.12 to 0.90 */
      const charP   = clamp((progress - 0.12) / 0.78, 0, 1);
      const revealed = Math.floor(charP * paraChars[i].length);
      paraChars[i].forEach((c, j) => {
        if (j < revealed) {
          if (!c.classList.contains('r')) c.classList.add('r');
        } else {
          if (c.classList.contains('r')) c.classList.remove('r');
        }
      });

      if (entered && !leaving) activeIdx = i;
    });

    /* Counter */
    pcounter.classList.toggle('vis', inF3);
    if (activeIdx >= 0) pcounter.textContent = `0${activeIdx + 1} / 02`;

  }, { passive: true });
</script>
</body>
</html>
