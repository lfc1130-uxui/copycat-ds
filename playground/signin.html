<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1.0" />
  <title>Sign In — Copycat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    /* ── DESIGN TOKENS ───────────────────────────────────────────────────── */
    :root {
      --blue-50:  #eff5ff; --blue-100: #dce8ff; --blue-200: #b8d2ff;
      --blue-300: #84b3ff; --blue-400: #3d87ff; --blue-500: #0068ff;
      --blue-600: #0054cc; --blue-700: #0040a0;
      --neutral-0:   #ffffff; --neutral-50:  #f8f9fc; --neutral-100: #f0f2f7;
      --neutral-200: #e2e5ef; --neutral-300: #c8cde0; --neutral-400: #9198b4;
      --neutral-500: #636a88; --neutral-600: #464d6b; --neutral-700: #313750;
      --neutral-800: #1e2235; --neutral-900: #111422;
      --green-500: #0caf60; --red-500: #f03030;
      --color-bg-page:    var(--neutral-50);
      --color-bg-surface: var(--neutral-0);
      --color-bg-subtle:  var(--neutral-100);
      --color-text-primary:   var(--neutral-900);
      --color-text-secondary: var(--neutral-600);
      --color-text-tertiary:  var(--neutral-400);
      --color-text-link:      var(--blue-600);
      --color-border-default: var(--neutral-200);
      --color-border-focus:   var(--blue-500);
      --color-brand:        var(--blue-500);
      --color-brand-hover:  var(--blue-600);
      --color-brand-subtle: var(--blue-50);
      --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
      --text-xs: 10px; --text-sm: 12px; --text-base: 14px;
      --text-md: 16px; --text-lg: 18px; --text-xl: 20px;
      --text-2xl: 24px; --text-3xl: 30px;
      --weight-regular: 400; --weight-medium: 500;
      --weight-semibold: 600; --weight-bold: 700; --weight-extrabold: 800;
      --leading-none: 1; --leading-tight: 1.25; --leading-normal: 1.5;
      --space-1: 4px; --space-1-5: 6px; --space-2: 8px; --space-3: 12px;
      --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-7: 28px;
      --space-8: 32px; --space-10: 40px; --space-12: 48px;
      --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px;
      --radius-xl: 12px; --radius-2xl: 16px; --radius-full: 9999px;
      --border-1: 1px;
      --duration-150: 150ms; --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── RESET ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── PAGE ────────────────────────────────────────────────────────────── */
    html, body {
      width: 360px;
      min-height: 780px;
      background: var(--color-bg-page);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 360px;
      min-height: 780px;
      background: var(--color-bg-page);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 0;
    }

    /* ── TOP BAR ─────────────────────────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px var(--space-6) var(--space-5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-400) 100%);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { display: block; }

    .logo-name {
      font-size: var(--text-md);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }

    /* ── CONTENT ─────────────────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 0 var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* ── HEADING ─────────────────────────────────────────────────────────── */
    .heading-block {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .heading-title {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
      letter-spacing: -0.025em;
      line-height: var(--leading-tight);
    }

    .heading-sub {
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      color: var(--color-text-secondary);
      line-height: var(--leading-normal);
    }

    /* ── FORM ────────────────────────────────────────────────────────────── */
    .form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* Input root */
    .input-root {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      width: 100%;
    }

    .input-label {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-primary);
      line-height: var(--leading-normal);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 48px;
      background: var(--color-bg-surface);
      border: var(--border-1) solid var(--color-border-default);
      border-radius: var(--radius-lg);
      transition: border-color var(--duration-150) var(--ease-in-out),
                  box-shadow var(--duration-150) var(--ease-in-out);
    }

    .input-wrapper:focus-within {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(0, 104, 255, 0.18);
    }

    .input-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-text-tertiary);
      padding-left: var(--space-3);
    }

    .input-field {
      flex: 1;
      height: 100%;
      padding: 0 var(--space-3);
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      color: var(--color-text-primary);
    }
    .input-field::placeholder { color: var(--color-text-tertiary); }

    .input-action {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding-right: var(--space-3);
      color: var(--color-text-tertiary);
      cursor: pointer;
    }

    /* ── FORGOT ──────────────────────────────────────────────────────────── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
    }

    .forgot-link {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-link);
      text-decoration: none;
    }

    /* ── BUTTON ──────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      height: 52px;
      font-family: var(--font-sans);
      font-size: var(--text-md);
      font-weight: var(--weight-bold);
      letter-spacing: 0.01em;
      white-space: nowrap;
      border: var(--border-1) solid transparent;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: filter var(--duration-150) var(--ease-in-out),
                  box-shadow var(--duration-150) var(--ease-in-out);
    }

    .btn--primary {
      background: linear-gradient(160deg, var(--blue-500) 0%, var(--blue-400) 100%);
      color: var(--neutral-0);
      box-shadow: 0 4px 14px rgba(0, 104, 255, 0.30);
    }

    .btn--outline {
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      border-color: var(--color-border-default);
      box-shadow: 0 1px 2px rgba(17, 20, 34, 0.06);
      font-weight: var(--weight-medium);
      font-size: var(--text-base);
    }

    /* ── DIVIDER ─────────────────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--color-border-default);
    }

    .divider-text {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }

    /* ── SOCIAL BUTTONS ──────────────────────────────────────────────────── */
    .social-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      padding: var(--space-6);
      padding-top: 0;
    }

    .footer-text {
      font-size: var(--text-base);
      color: var(--color-text-secondary);
    }

    .footer-link {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-brand);
      text-decoration: none;
    }

    /* ── BADGE (trusted by) ──────────────────────────────────────────────── */
    .trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1-5);
      padding-bottom: var(--space-2);
    }

    .trust-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--green-500);
    }

    .trust-text {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: var(--weight-medium);
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2L15.5 5.75V12.25L9 16L2.5 12.25V5.75L9 2Z" fill="white" opacity="0.9"/>
            <path d="M9 5.5L12.5 7.5V11.5L9 13.5L5.5 11.5V7.5L9 5.5Z" fill="white"/>
          </svg>
        </div>
        <span class="logo-name">Copycat</span>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- HEADING -->
      <div class="heading-block">
        <h1 class="heading-title">Welcome back</h1>
        <p class="heading-sub">Sign in to your account to continue</p>
      </div>

      <!-- FORM -->
      <div class="form">

        <!-- Email -->
        <div class="input-root">
          <label class="input-label">Email address</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.25"/>
                <path d="M1.5 5.5L8 9.5L14.5 5.5" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
              </svg>
            </div>
            <input class="input-field" type="email" placeholder="you@company.com" value="" />
          </div>
        </div>

        <!-- Password -->
        <div class="input-root">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="3.5" y="7" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.25"/>
                <path d="M5 7V5C5 3.34315 6.34315 2 8 2C9.65685 2 11 3.34315 11 5V7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
              </svg>
            </div>
            <input class="input-field" type="password" placeholder="••••••••" value="" />
            <div class="input-action">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M1.5 8C1.5 8 3.5 4 8 4C12.5 4 14.5 8 14.5 8C14.5 8 12.5 12 8 12C3.5 12 1.5 8 1.5 8Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.25"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Forgot -->
        <div class="forgot-row">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Sign in -->
        <button class="btn btn--primary">Sign in</button>

      </div>

      <!-- DIVIDER -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with</span>
        <div class="divider-line"></div>
      </div>

      <!-- SOCIAL -->
      <div class="social-group">
        <button class="btn btn--outline">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.1 9.2c0-.6-.05-1.2-.16-1.77H9v3.35h4.54a3.88 3.88 0 0 1-1.68 2.55v2.12h2.71C16.14 13.86 17.1 11.7 17.1 9.2Z" fill="#4285F4"/>
            <path d="M9 17.5c2.27 0 4.17-.75 5.56-2.04l-2.71-2.12C11.04 14 10.07 14.3 9 14.3c-2.19 0-4.05-1.48-4.71-3.47H1.5v2.19A8.5 8.5 0 0 0 9 17.5Z" fill="#34A853"/>
            <path d="M4.29 10.83A5.1 5.1 0 0 1 4.02 9c0-.64.11-1.26.27-1.83V4.98H1.5A8.5 8.5 0 0 0 .5 9c0 1.37.33 2.67.91 3.83l2.88-2Z" fill="#FBBC04"/>
            <path d="M9 3.7c1.24 0 2.35.43 3.23 1.26l2.42-2.42A8.47 8.47 0 0 0 9 .5 8.5 8.5 0 0 0 1.5 4.98l2.78 2.19C4.95 5.18 6.81 3.7 9 3.7Z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn btn--outline">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M13.22 9.49c-.02-1.78 1.46-2.64 1.53-2.68-1.33-1.95-3.4-1.7-3.4-1.7-1.44-.14-2.82.85-3.55.85-.73 0-1.84-.83-3.04-.81C2.96 5.18 1.4 6.34.62 8.03c-1.57 2.72-.4 6.74 1.12 8.94.75 1.08 1.64 2.29 2.8 2.25 1.13-.05 1.56-.73 2.92-.73 1.37 0 1.76.73 2.97.7 1.21-.03 1.98-1.1 2.72-2.18.87-1.25 1.22-2.46 1.24-2.52-.03-.01-2.37-.91-2.39-3.61l.01.11Z" fill="#1D1D1F"/>
            <path d="M11.44 4.04c.62-.75 1.04-1.8.92-2.85-.9.04-1.98.6-2.62 1.34-.58.67-1.08 1.74-.95 2.76 1 .08 2.03-.51 2.65-1.25Z" fill="#1D1D1F"/>
          </svg>
          Continue with Apple
        </button>
      </div>

    </div>

    <!-- FOOTER -->
    <div style="flex: 1;"></div>
    <div class="trust-row">
      <div class="trust-dot"></div>
      <span class="trust-text">256-bit SSL encryption · SOC 2 certified</span>
    </div>
    <div class="footer">
      <span class="footer-text">Don't have an account?</span>
      <a href="#" class="footer-link">Sign up</a>
    </div>

  </div>
</body>
</html>
